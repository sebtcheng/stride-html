<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STRIDE — Strategic Resource Inventory</title>
<script src="./stride-assets.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
  :root {
    --navy:#08315F; --blue:#075985; --blue600:#0284C7; --blue400:#7DD3FC;
    --blue100:#E0F2FE; --blue50:#F0F9FF; --gold:#FBBF24; --amber:#D97706;
    --text:#0F172A; --muted:#64748B; --line:#BAE6FD;
    --font:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { min-height:100%; }
  a { text-decoration:none; color:inherit; }
  body {
    font-family:var(--font); color:var(--text); min-height:100vh;
    background-color:var(--blue50); background-attachment:fixed;
    background-image:
      radial-gradient(43.5% 49.5% at 10% 12%, rgba(7,89,133,.30) 0 34%, transparent 78%),
      radial-gradient(46.5% 54% at 92% 10%, rgba(251,191,36,.42) 0 36%, transparent 80%),
      radial-gradient(40.5% 48% at 84% 92%, rgba(125,211,252,.30) 0 34%, transparent 78%),
      radial-gradient(45% 52.5% at 8% 92%, rgba(217,119,6,.26) 0 28%, rgba(251,191,36,.18) 42%, transparent 80%);
  }



  /* ---------- HERO ---------- */
  .stage { display:flex; align-items:stretch; min-height:100vh; width:100%; gap:20px; }
  .hero { text-align:left; padding:40px 4vw 40px 6vw; flex:1 1 54%; min-width:0; margin:0; position:relative; display:flex; flex-direction:column; align-items:flex-start; justify-content:center; }
  .hero-content { display:flex; flex-direction:column; align-items:flex-start; animation:fadeUp .8s cubic-bezier(.2,.7,.2,1) both; }
  .hero .lede { max-width:540px; margin:22px 0 34px; color:var(--muted); font-size:clamp(16px,1.5vw,20px); line-height:1.5; font-weight:500; }
  .browser { flex:1 1 46%; min-width:0; align-self:center; margin:auto 40px; border-radius:16px; overflow:hidden; background:#fff; border:1px solid rgba(8,49,95,.10); box-shadow:0 44px 90px -24px rgba(8,49,95,.38), 0 14px 34px -14px rgba(8,49,95,.22); animation:frameIn 1s cubic-bezier(.2,.7,.2,1) .2s both; }
  .browser-bar { display:flex; align-items:center; gap:8px; padding:11px 16px; background:linear-gradient(180deg,#F8FAFC,#EDF2F7); border-bottom:1px solid rgba(8,49,95,.08); }
  .browser-bar .dot { width:12px; height:12px; border-radius:50%; display:block; }
  .browser-bar .dot.red { background:#FF5F57; }
  .browser-bar .dot.amber { background:#FEBC2E; }
  .browser-bar .dot.green { background:#28C840; }
  .browser-url { margin-left:14px; flex:1; height:24px; border-radius:7px; background:#fff; border:1px solid rgba(8,49,95,.10); display:flex; align-items:center; padding:0 14px; font-size:11.5px; color:var(--muted); font-weight:600; }
  .slideshow { position:relative; width:100%; overflow:hidden; background:#fff; font-size:0; }
  .slideshow .slide { display:block; width:100%; opacity:0; transition:opacity 1s ease; }
  .slideshow .slide.base { position:relative; }
  .slideshow .slide.stack { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .slideshow .slide.active { opacity:1; }
  .slideshow .empty { display:grid; place-items:center; min-height:220px; padding:20px; color:var(--muted); font-weight:600; text-align:center; font-size:14px; }
  @media (max-width:1180px){
    .stage { flex-direction:column; min-height:auto; gap:0; }
    .hero { flex:none; padding:44px 6vw 24px; }
    .browser { flex:none; width:auto; max-width:none; margin:0 6vw 28px; }
  }
  .logos { display:flex; gap:24px; justify-content:flex-start; align-items:center; margin-bottom:30px; }
  .logo-slot { width:84px; height:66px; display:grid; place-items:center; transition:transform .25s ease; }
  .logo-slot img { width:100%; height:100%; object-fit:contain; display:block; }
  .logo-slot.logo-vertical img { width:175%; height:175%; object-fit:contain; }
  .logo-slot:hover { transform:translateY(-3px); }
  .hero h1 { color:var(--navy); font-weight:800; font-size:clamp(34px,4.4vw,66px); line-height:1.04; letter-spacing:-1px; cursor:default; max-width:100%; overflow-wrap:break-word; word-break:break-word; filter:drop-shadow(0 10px 16px rgba(8,49,95,.30)); transition:transform .25s ease, text-shadow .25s ease; }
  .hero h1:hover { transform:translateY(-3px); text-shadow:0 12px 26px rgba(8,49,95,.18); }
  .hero h1 .mark { position:relative; overflow:hidden; background:var(--gold); color:var(--navy); padding:4px 26px 12px; border-radius:14px; display:inline-block; max-width:none; white-space:nowrap; margin-top:10px; margin-left:-26px; box-shadow:0 14px 40px rgba(251,191,36,.4); }
  .hero h1 .mark::after {
    content:""; position:absolute; top:0; left:-75%; width:50%; height:100%; pointer-events:none;
    background:linear-gradient(100deg, transparent 0%, rgba(255,255,255,.18) 35%, rgba(255,255,255,.85) 50%, rgba(255,255,255,.18) 65%, transparent 100%);
    transform:skewX(-20deg); animation:markShine 5.8s ease-in-out infinite;
  }
  @keyframes markShine {
    0%   { left:-75%; }
    14%  { left:150%; }
    100% { left:150%; }
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes frameIn { from { opacity:0; transform:translateY(28px) scale(.985); } to { opacity:1; transform:translateY(0) scale(1); } }

  /* ---------- ENTER BUTTON ---------- */
  .enter-btn {
    display:inline-flex; align-items:center; gap:16px;
    padding:12px 12px 12px 34px; border-radius:50px; cursor:pointer; border:none;
    font-family:var(--font); font-weight:700; font-size:17px; color:var(--navy);
    background:linear-gradient(135deg,#FDD34D 0%,var(--gold) 55%,var(--amber) 130%);
    box-shadow:0 16px 34px rgba(251,191,36,.42), inset 0 1px 0 rgba(255,255,255,.55);
    filter:drop-shadow(0 10px 16px rgba(8,49,95,.30));
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .enter-btn:hover { transform:translateY(-3px); box-shadow:0 24px 46px rgba(251,191,36,.55), inset 0 1px 0 rgba(255,255,255,.6); }
  .enter-btn:active { transform:translateY(-1px); }
  .enter-btn .arw {
    width:40px; height:40px; border-radius:50%; background:var(--navy); color:#fff;
    display:grid; place-items:center; font-size:17px; transition:transform .25s ease;
  }
  .enter-btn:hover .arw { transform:translateX(5px); }

  @media (max-width:720px){
    .hero { padding-top:44px; align-items:flex-start; }
    .logos { gap:14px; margin-bottom:22px; flex-wrap:wrap; }
    .logo-slot { width:62px; height:50px; }
    .hero h1 { font-size:clamp(22px,6.4vw,40px); }
    .hero h1 .mark { max-width:none; white-space:nowrap; margin-left:-18px; padding:4px 18px 10px; }
    .browser { margin:0 4vw 24px; border-radius:12px; }
    .browser-url { font-size:10px; padding:0 10px; }
  }
</style>
</head>
<body>


  <script>
  (function(){
    if (!("serviceWorker" in navigator) || location.protocol === "file:") return;
    var CSVS_TO_PRELOAD = (window.STRIDE_ASSETS && window.STRIDE_ASSETS.csvUrls)
      ? window.STRIDE_ASSETS.csvUrls
      : [
        "./all_deped_summary_april2026.csv",
        "./efd_classroom_july2026.csv",
        "./enrolment_sy2025-2026.csv",
        "./insighted_classes_organized.csv",
        "./insighted_classroom_conditions.csv",
        "./insighted_classroom_repairs.csv",
        "./insighted_electrical_safety.csv",
        "./insighted_furniture.csv",
        "./insighted_gadgets.csv",
        "./insighted_infra_summary.csv",
        "./insighted_safety_equipment.csv",
        "./insighted_school_info.csv",
        "./insighted_shifting.csv",
        "./insighted_utilities.csv",
        "./insighted_wash.csv",
        "./ph_schools_20260616410.csv",
        "./sdo_classification_202606151013.csv",
        "./stride_school_unique.csv"
      ];
    function warmCache(sw){ if (sw) sw.postMessage({ type: "WARM_CSV_CACHE", urls: CSVS_TO_PRELOAD }); }
    navigator.serviceWorker.register("./stride-csv-cache-sw.js").then(function(reg){
      if (reg.active) warmCache(reg.active);
      navigator.serviceWorker.addEventListener("controllerchange", function(){ warmCache(navigator.serviceWorker.controller); });
      if (reg.installing) reg.installing.addEventListener("statechange", function(e){ if (e.target.state === "activated") warmCache(e.target); });
      if (reg.waiting) reg.waiting.addEventListener("statechange", function(e){ if (e.target.state === "activated") warmCache(e.target); });
    }).catch(function(){});
  })();
  </script>
  <div class="stage">
  <section class="hero">
    <div class="hero-content">
      <div class="logos">
        <div class="logo-slot"><img src="./bagong_pilipinas.png" alt="Bagong Pilipinas logo"></div>
        <div class="logo-slot"><img src="./deped_logo.png" alt="Department of Education logo"></div>
        <div class="logo-slot"><img src="./hrod_logo.png" alt="HROD logo"></div>
        <div class="logo-slot logo-vertical"><img src="./insighted_logo_vertical.png" alt="InsightED logo"></div>
      </div>
      <h1>Strategic Resource<br>Inventory for<br><span class="mark">Deployment Efficiency</span></h1>
      <p class="lede">Empowering the Department with data analytics for more effective and informed resource allocation strategy and decision-making</p>
    </div>
  </section>
    <aside class="browser">
      <div class="browser-bar">
        <span class="dot red"></span><span class="dot amber"></span><span class="dot green"></span>
        <div class="browser-url">stride.deped.gov.ph/dashboard</div>
      </div>
      <div class="slideshow" id="slideshow">
        <div class="empty" id="slideshowEmpty">Loading screenshots…</div>
      </div>
    </aside>
  </div>
  <script>
  (function(){
    var IMAGE_RE = /^Screenshot.*\.(png|jpe?g|gif|webp|bmp|avif)$/i;
    var container = document.getElementById("slideshow");
    var emptyEl = document.getElementById("slideshowEmpty");

    function discoverScreenshots(){
      var files = [
        "Screenshot_34.png",
        "Screenshot_35.png",
        "Screenshot_36.png"
      ];

      if (window.STRIDE_ASSETS) {
        if (Array.isArray(window.STRIDE_ASSETS.screenshotFiles)) {
          files = window.STRIDE_ASSETS.screenshotFiles.slice();
        } else if (Array.isArray(window.STRIDE_ASSETS.screenshots)) {
          files = window.STRIDE_ASSETS.screenshots.slice();
        } else if (Array.isArray(window.STRIDE_ASSETS.screenshotUrls)) {
          files = window.STRIDE_ASSETS.screenshotUrls.slice();
        }
      }

      return Promise.resolve(
        files
          .map(function(file){ return String(file || "").replace(/^\.\//, ""); })
          .filter(function(file){ return IMAGE_RE.test(file); })
          .sort(function(a,b){ return a.localeCompare(b, undefined, { numeric:true, sensitivity:"base" }); })
      );
    }

    function startSlideshow(files){
      if (!files.length){
        if (emptyEl) emptyEl.textContent = "No screenshots found in this folder.";
        return;
      }
      if (emptyEl) emptyEl.remove();

      var failed = 0;
      var slides = files.map(function(file, i){
        var slide = document.createElement("img");
        slide.className = "slide " + (i === 0 ? "base active" : "stack");
        slide.alt = "STRIDE dashboard screenshot";
        slide.loading = "eager";
        slide.onerror = function(){
          failed += 1;
          slide.remove();
          if (failed === files.length && container) {
            container.innerHTML = '<div class="empty">Screenshots were found in the manifest, but the PNG files did not load. Check filename case and GitHub Pages deployment cache.</div>';
          }
        };
        slide.src = "./" + encodeURIComponent(file).replace(/%2F/g, "/");
        container.appendChild(slide);
        return slide;
      });

      var current = 0, timer = null;
      function show(index){
        slides[current].classList.remove("active");
        current = (index + slides.length) % slides.length;
        slides[current].classList.add("active");
      }
      function next(){ show(current + 1); }
      function resetTimer(){ if (timer) clearInterval(timer); timer = setInterval(next, 5000); }

      if (slides.length > 1) resetTimer();
    }

    discoverScreenshots().then(startSlideshow);
  })();
  </script>
</body>
</html>
